server:
  port: 8081

codexray:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: 86400000
  clone:
    base-dir: /tmp/codexray-clones
  llm:
    base-url: ${LLM_BASE_URL:https://token-plan-cn.xiaomimimo.com/anthropic}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:mimo-v2.5-pro}
    max-tokens: ${LLM_MAX_TOKENS:8192}
    embedding-url: ${EMBEDDING_URL:https://token-plan-cn.xiaomimimo.com/v1}
    embedding-model: ${EMBEDDING_MODEL:text-embedding-3-small}
  mail:
    enabled: ${MAIL_ENABLED:false}
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:codexray}
    secret-key: ${MINIO_SECRET_KEY:codexray123}
    bucket: ${MINIO_BUCKET:codexray}

spring:
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
