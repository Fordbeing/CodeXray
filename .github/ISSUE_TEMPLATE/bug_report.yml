name: Bug Report
description: Report a bug to help us improve
body:
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 简要描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个 bug
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 看到错误 '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Docker 版本、浏览器等
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: "e.g. v1.0.0"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 相关日志或截图
    validations:
      required: false
