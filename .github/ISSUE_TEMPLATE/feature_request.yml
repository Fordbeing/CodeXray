name: Feature Request
description: Suggest a new feature or improvement
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望添加什么功能
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 分类
      options:
        - 分析功能
        - 代码问答 (RAG)
        - GitHub 热点
        - UI/UX
        - 性能优化
        - 其他
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 使用场景
      description: 这个功能在什么场景下会用到
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 目前你是如何解决这个问题的
    validations:
      required: false
